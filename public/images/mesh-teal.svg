<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" fill="none">
  <!-- Brand-tinted mesh background: soft teal/cyan blobs, heavily blurred.
       Licensing-free (hand-authored). Use as a decorative section backdrop:
       <Image src="/images/mesh-teal.svg" fill className="object-cover opacity-…" /> -->
  <defs>
    <radialGradient id="m1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#E9F8F2"/>
  <g filter="url(#soft)">
    <circle cx="220" cy="180" r="260" fill="url(#m1)"/>
    <circle cx="980" cy="140" r="300" fill="url(#m2)"/>
    <circle cx="320" cy="660" r="280" fill="url(#m4)"/>
    <circle cx="900" cy="640" r="320" fill="url(#m3)"/>
    <circle cx="600" cy="400" r="240" fill="url(#m1)"/>
  </g>
</svg>
