version: '3.8'

services:
  toshi:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Staging URL — change to https://toshiconsulting.com on prod deploy
        - NEXT_PUBLIC_SITE_URL=https://tcsdev.sentinal-ai.in
    image: toshi-consulting:latest
    container_name: toshi-consulting
    restart: unless-stopped
    ports:
      - "172.17.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://tcsdev.sentinal-ai.in
    networks:
      - default

networks:
  default:
    driver: bridge
